syntax = "proto3";

// Nome do pacote para organizar os serviços do Atlas
package tracks;

// 1. O Serviço (A "porta de entrada" que vamos disponibilizar)
service TracksService {
    // Definimos uma função que recebe um TrackRequest e devolve um TrackResponse
    rpc GetTrackInfo (TrackRequest) returns (TrackResponse);
}

// 2. A Requisição (O que nós EXIGIMOS que nos enviem)
message TrackRequest {
    string track_id = 1;
}

// 3. A Resposta (O que nós PROMETEMOS devolver)
message TrackResponse {
    string id = 1;
    string title = 2;
    string description = 3;
    string status = 4;
}
