syntax = "proto3";

package user;

service AuthService {
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string role    = 3;
  string email   = 4;
}

// Definição do Serviço que os outros microsserviços vão chamar
service UserService {
  rpc GetUserProfile (UserRequest) returns (UserResponse);
}

// O que o outro serviço precisa enviar (a matrícula ou o ID do aluno)
message UserRequest {
  string matricula = 1;
}

// O que o nosso serviço vai responder
message UserResponse {
  string id = 1;
  string matricula = 2;
  string first_name = 3;
  string full_name = 4;
  string email = 5;
  string role = 6;
  float ira = 7;
  int32 period = 8;
  string about_me = 9;
  string linkedin = 10;
  string github = 11;
  string curriculo_lattes = 12;
  string course_name = 13;
  string institution_name = 14;
}
